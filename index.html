<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMART 客戶跟進</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Patrick+Hand&display=swap');
:root{
  --paper:#FBF7EE; --ink:#2c2a33; --muted:#7c7890; --line:#ece6da;
  --card:#fffdf8; --violet:#6d5bd0; --violet-soft:#efeaff;
  --y:#FFE9A8; --yl:#FFF4D1; --pk:#FBD0E4; --pkl:#FDE7F1;
  --pu:#E2D8FB; --pul:#F0EBFD; --gr:#C5EFCF; --grl:#E3F7E8;
  --bl:#C5E6FB; --bll:#E5F4FE; --or:#FFD8B0; --orl:#FFEBD6;
  --hand:'Patrick Hand','Noto Sans TC','PingFang TC','Microsoft JhengHei',system-ui,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  background:var(--paper);
  background-image:radial-gradient(circle, #e7dfcf 1px, transparent 1px);
  background-size:22px 22px;
  color:var(--ink);
  font-family:'Inter','Noto Sans TC','PingFang TC','Microsoft JhengHei',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;font-size:15px;line-height:1.5;
}
a{color:#3b82f6;text-decoration:none}a:hover{text-decoration:underline}
button{font-family:inherit;cursor:pointer;border:none;background:none}
.ic{display:inline-block;vertical-align:-.12em;flex:none}
.wrap{max-width:1140px;margin:0 auto;padding:22px 16px 80px}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}

/* hand-drawn helpers */
.hand{font-family:var(--hand)}
.hl{background:linear-gradient(180deg,transparent 58%,var(--hlc,var(--y)) 58%);padding:0 3px;border-radius:3px;box-decoration-break:clone;-webkit-box-decoration-break:clone}
.doodle{color:#bdb6a3}

/* header */
header{position:sticky;top:0;z-index:30;background:rgba(251,247,238,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.hbar{max-width:1140px;margin:0 auto;padding:8px 16px;display:flex;align-items:center;gap:12px}
.brand{font-family:'Caveat',cursive;font-size:30px;font-weight:700;color:var(--ink);line-height:1;white-space:nowrap;display:flex;align-items:center;gap:6px}
.brand .star{color:#f5b301}
.nav{display:flex;gap:4px;overflow-x:auto;flex:1;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.navbtn{font-family:var(--hand);font-size:17px;white-space:nowrap;color:var(--muted);padding:6px 12px;border-radius:999px;border:2px solid transparent}
.navbtn:hover{background:#fff}
.navbtn.on{background:var(--violet);color:#fff}
.navbtn .b{font-family:inherit;font-size:12px;background:rgba(255,255,255,.35);border-radius:999px;padding:0 6px;margin-left:3px}
.htools{display:flex;align-items:center;gap:6px}
.iconbtn{padding:8px;border-radius:12px;color:var(--muted)}
.iconbtn:hover{background:#fff;color:var(--ink)}
.addbtn{display:inline-flex;align-items:center;gap:6px;background:var(--ink);color:#fff;font-weight:600;font-size:14px;border-radius:12px;padding:8px 13px;box-shadow:2px 3px 0 #d9cfba}
.addbtn:active{transform:translate(1px,2px);box-shadow:1px 1px 0 #d9cfba}
.saved{font-size:12px;color:#16a34a;opacity:0;transition:.3s}.saved.on{opacity:1}
.menu{position:relative}
.menupop{position:absolute;right:0;top:110%;background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,.12);padding:6px;width:190px;z-index:40}
.menupop button{display:flex;width:100%;text-align:left;gap:8px;align-items:center;font-size:14px;padding:8px 10px;border-radius:9px;color:var(--ink)}
.menupop button:hover{background:var(--violet-soft)}

/* section title */
.sectitle{font-family:var(--hand);font-size:24px;display:flex;align-items:center;gap:8px;margin:0}
.count{font-size:12px;font-family:'Inter',sans-serif;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:999px;padding:1px 9px}
.subt{color:var(--muted);font-size:13px;margin:2px 0 0}

/* grids */
.grid{display:grid;gap:16px}
.cards{grid-template-columns:repeat(auto-fill,minmax(270px,1fr))}
.mini{grid-template-columns:repeat(auto-fill,minmax(250px,1fr))}

/* sticky note card (dashboard) */
.sticky{position:relative;border-radius:14px;padding:14px 15px;border:1px solid rgba(0,0,0,.05);
  box-shadow:2px 4px 12px rgba(120,110,80,.13);text-align:left;width:100%;transition:transform .12s}
.sticky:hover{transform:translateY(-3px) rotate(0deg)!important}
.sticky.r1{transform:rotate(-1.1deg)}.sticky.r2{transform:rotate(1deg)}.sticky.r3{transform:rotate(-.5deg)}.sticky.r4{transform:rotate(.7deg)}
.sticky .tape{position:absolute;top:-7px;left:50%;transform:translateX(-50%) rotate(-3deg);width:48px;height:15px;background:rgba(255,255,255,.55);border:1px solid rgba(0,0,0,.04);border-radius:2px}
.st-top{display:flex;justify-content:space-between;align-items:center;gap:6px;margin-bottom:6px}
.st-cust{font-size:12px;font-weight:700;color:#5b5570;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.st-subj{font-weight:600;color:var(--ink);font-size:14.5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.st-meta{font-size:12px;color:#6b6680;margin-top:6px;display:flex;flex-wrap:wrap;gap:8px}
.late{display:inline-flex;align-items:center;gap:3px;font-weight:700;font-size:12px;color:#d6336c}
.late.soft{color:#e8730c}

/* plain card / customer card */
.pcard{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;text-align:left;width:100%;
  box-shadow:1px 2px 0 #efe7d6;transition:.14s;display:flex;flex-direction:column;gap:11px}
.pcard:hover{box-shadow:2px 5px 18px rgba(120,110,80,.16);transform:translateY(-2px)}
.pcard[draggable="true"]{cursor:grab}.pcard[draggable="true"]:active{cursor:grabbing}
.pcard.dropmark{box-shadow:0 0 0 2.5px var(--violet);transform:translateY(-2px)}
.ctop{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.cmeta{flex:1;min-width:0}
.cnamerow{display:flex;align-items:center;gap:6px;min-width:0}
.cnamerow .cname{min-width:0}
.cstat{display:inline-flex;align-items:center;gap:5px;font-size:11px;border-radius:999px;padding:2px 9px;background:#f4f1ea;color:#5b5570;font-weight:600}
.cstat .d{width:7px;height:7px;border-radius:999px;flex:none}
.cardimg{width:60px;height:38px;object-fit:cover;border-radius:8px;border:1px solid var(--line);cursor:zoom-in}
.fsublist{margin:4px 0 0;padding:0;list-style:none}
.fsublist li{display:flex;gap:6px;align-items:baseline;font-size:14px;color:#55506a;padding:2px 0}
.fsublist li:before{content:"›";color:#bdb6a3;flex:none}
.threadbar{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.thchip{font-size:12px;font-weight:600;border-radius:999px;padding:3px 11px;border:1.5px solid var(--line);background:#fff;color:#6b6680;max-width:230px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.thchip:hover{border-color:#d8d2e6}
.thchip.on{background:var(--violet);color:#fff;border-color:var(--violet)}
.threadtag{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;border-radius:7px;padding:1px 7px;background:var(--pul);color:#5b4fc0;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.threadtag.gen{background:#f1efe7;color:#8b8699}
.cname{font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ctype{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.rate{font-size:12px;font-weight:800;border-radius:8px;padding:1px 7px;flex:none}
.row{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.tag{font-size:11px;border-radius:999px;padding:2px 8px;background:var(--violet-soft);color:#5b4fc0;font-weight:600}
.tag.g{background:#f1efe7;color:#6b6680}
.tag.muted{background:none;color:#9b96aa}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;border-radius:999px;padding:2px 9px;font-weight:600}
.chip .d{width:7px;height:7px;border-radius:999px}
.dotred{width:9px;height:9px;border-radius:999px;background:#fa5252;flex:none;box-shadow:0 0 0 3px #ffe3e3}
.flag{font-size:11px;font-weight:700;border-radius:8px;padding:1px 7px;background:#fff0f0;color:#e03131;border:1px solid #ffd6d6}

/* detail */
.back{font-family:var(--hand);font-size:18px;display:inline-flex;align-items:center;gap:5px;color:var(--muted);margin-bottom:14px}
.back:hover{color:var(--ink)}
.panel{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:20px;box-shadow:1px 2px 0 #efe7d6}
.dtitle{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.dtitle h1{font-size:22px;margin:0}
.metar{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:5px 22px;margin-top:14px;font-size:14px}
.mrow{display:flex;align-items:center;gap:8px;color:#55506a}.mrow .ic{color:#a8a2b8}
.block{margin-top:14px}.block .lbl{font-size:12px;font-weight:700;color:#a8a2b8;margin-bottom:3px}
.block p{margin:0;font-size:14px;color:#444056;white-space:pre-wrap;line-height:1.6}
.contacts{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.contact{background:var(--pul);border:1px solid #e3dbf7;border-radius:12px;padding:8px 11px;font-size:13px;min-width:150px}
.contact b{display:block}
.contact span{color:var(--muted);font-size:12px}

/* project */
.proj{background:var(--card);border:1px solid var(--line);border-radius:20px;overflow:hidden;box-shadow:1px 2px 0 #efe7d6}
.proj.held{opacity:.85}
.phead{padding:18px}
.lblrow{display:flex;align-items:center;gap:6px;font-size:11px;color:#a8a2b8;margin-bottom:3px;font-weight:600}
.csubj{font-weight:700;color:var(--ink);font-size:16px;line-height:1.35}
.fsubj{font-size:14px;color:#55506a}
.stage-sel{font-size:12px;font-weight:700;border-radius:999px;padding:5px 12px;border:none;appearance:none;-webkit-appearance:none;cursor:pointer}
.qbtns{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.qb{font-size:12px;font-weight:600;border:1.5px dashed #d8d2e6;color:#6b6680;border-radius:10px;padding:5px 10px}
.qb:hover{background:var(--violet-soft);border-color:var(--violet);color:var(--violet)}
.actbar{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;padding-top:12px;border-top:1px dashed var(--line)}
.act{font-size:13px;font-weight:600;border-radius:10px;padding:6px 11px;color:#55506a;background:#f4f1ea}
.act:hover{background:#ece7dc}
.act.warn:hover{background:#fff0f0;color:#e03131}

/* sub tabs */
.subtabs{display:flex;gap:4px;padding:0 18px;border-bottom:1px solid var(--line);background:#fbf9f3}
.subtab{font-size:13px;font-weight:600;color:var(--muted);padding:10px 12px;border-bottom:2.5px solid transparent;margin-bottom:-1px}
.subtab.on{color:var(--violet);border-color:var(--violet)}
.subbody{padding:16px 18px;background:#fbf9f3}

/* timeline */
.tlhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.linkbtn{display:inline-flex;align-items:center;gap:4px;font-size:13px;color:var(--violet);font-weight:700}
ol.line{position:relative;margin:0 0 0 6px;padding:0;list-style:none;border-left:2px solid #e9e3d6}
ol.line li{position:relative;padding:0 0 16px 16px}ol.line li:last-child{padding-bottom:0}
ol.line .pt{position:absolute;left:-6px;top:5px;width:10px;height:10px;border-radius:999px;background:#fff;border:2.5px solid #c9c2dd}
.date{font-size:12px;font-weight:700;color:#55506a}
.note{font-size:14px;color:#3f3b52;margin:2px 0 0;white-space:pre-wrap;line-height:1.55}
.mailchip{display:inline-flex;align-items:center;gap:4px;font-size:11px;border-radius:8px;padding:2px 7px;border:1px solid var(--line);background:#fff;color:#6b6680;margin:6px 6px 0 0}
.mailchip.lk{color:#3b82f6}
.delx{color:#f7a8c0;padding:2px}.delx:hover{color:#e03177}

/* generic list rows (quotes/samples) */
.lrow{background:#fff;border:1px solid var(--line);border-radius:13px;padding:11px 13px;margin-bottom:9px}
.lrow .h{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
.lrow .ti{font-weight:700}
.tier{display:inline-block;font-size:12px;background:var(--yl);border:1px solid #f1e3b8;border-radius:8px;padding:1px 8px;margin:4px 4px 0 0}
.kv{font-size:12px;color:#6b6680;margin-top:4px;display:flex;flex-wrap:wrap;gap:10px}

.iconmini{padding:6px;border-radius:9px;color:#a8a2b8}.iconmini:hover{background:#f1eee6}.iconmini.del:hover{background:#fff0f0;color:#fb7185}
.grow{flex:1}.muted{color:var(--muted)}.right{margin-left:auto}

/* tabs */
.tabs{display:flex;gap:6px;margin:18px 0 16px;flex-wrap:wrap}
.tab{font-family:var(--hand);font-size:17px;border-radius:999px;padding:5px 15px;background:#fff;color:var(--muted);border:2px solid var(--line)}
.tab:hover{border-color:#d8d2e6}
.tab.on{background:var(--ink);color:#fff;border-color:var(--ink)}

/* board */
.board{display:flex;gap:14px;overflow-x:auto;padding-bottom:12px}
.bcol{min-width:230px;width:230px;flex:none;background:#fbf8f0;border:1px solid var(--line);border-radius:16px;padding:10px}
.bcol.over{background:var(--violet-soft);border-color:var(--violet)}
.bcol h4{font-family:var(--hand);font-size:17px;margin:2px 4px 10px;display:flex;align-items:center;gap:6px}
.bcard{background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:9px;box-shadow:1px 1px 0 #efe7d6;cursor:grab}
.bcard:active{cursor:grabbing}
.bcard .bc{font-size:11px;color:var(--muted);font-weight:700}
.bcard .bs{font-size:13px;font-weight:600;margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* notes */
.notecard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px;box-shadow:1px 2px 0 #efe7d6;break-inside:avoid}
.notecard h3{margin:0 0 7px;font-family:var(--hand);font-size:20px}
.notecard .ct{font-size:13.5px;white-space:pre-wrap;color:#3f3b52;line-height:1.55}
.notecard img{max-width:100%;border-radius:10px;margin-top:8px;border:1px solid var(--line)}
.ntags{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
.ntag{font-size:11px;background:var(--grl);color:#2f7d4a;border:1px solid #cdeecf;border-radius:999px;padding:1px 8px;font-weight:600}
.ntag.cust{background:var(--bll);color:#1c6fa8;border-color:#cbe6f7}

/* empty */
.empty{border:2px dashed #ddd6c6;border-radius:18px;background:rgba(255,255,255,.5);padding:30px 16px;text-align:center;color:var(--muted)}
.empty .big{font-size:34px}
.empty p{margin:8px 0 0;font-family:var(--hand);font-size:18px}

/* modal */
.overlay{position:fixed;inset:0;z-index:60;background:rgba(44,42,51,.42);display:flex;align-items:flex-end;justify-content:center}
@media(min-width:640px){.overlay{align-items:center;padding:16px}}
.sheet{background:var(--card);width:100%;max-width:540px;max-height:92vh;overflow-y:auto;border-radius:20px 20px 0 0;box-shadow:0 20px 60px rgba(0,0,0,.25)}
@media(min-width:640px){.sheet{border-radius:20px}}
.mhead{position:sticky;top:0;background:var(--card);display:flex;justify-content:space-between;align-items:center;padding:15px 20px;border-bottom:1px solid var(--line);z-index:2}
.mhead h3{margin:0;font-family:var(--hand);font-size:21px}
.mbody{padding:20px;display:flex;flex-direction:column;gap:14px}
.mfoot{position:sticky;bottom:0;background:var(--card);display:flex;justify-content:flex-end;gap:8px;padding:14px 20px;border-top:1px solid var(--line)}
label.fld{display:block}label.fld>span{font-size:12px;font-weight:700;color:var(--muted)}
.inp{width:100%;font-size:14px;border:1.5px solid #ded8cb;border-radius:11px;padding:9px 12px;margin-top:5px;outline:none;font-family:inherit;background:#fff}
.inp:focus{border-color:var(--violet);box-shadow:0 0 0 3px var(--violet-soft)}
textarea.inp{resize:vertical}
.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.btn-ghost{font-size:14px;padding:9px 16px;border-radius:11px;color:#55506a}.btn-ghost:hover{background:#f1eee6}
.btn-dark{font-size:14px;padding:9px 18px;border-radius:11px;background:var(--ink);color:#fff;font-weight:600}.btn-dark:hover{background:#000}
.btn-soft{font-size:13px;padding:0 14px;border-radius:11px;background:var(--violet-soft);color:var(--violet);font-weight:600}.btn-soft:hover{background:#e6dfff}
.repeat{display:flex;align-items:center;gap:8px;font-size:13px;background:#faf8f2;border:1px solid var(--line);border-radius:11px;padding:8px 10px;margin-bottom:6px}
.line1{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tagpick{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.tagopt{font-size:12px;border:1.5px solid #ded8cb;border-radius:999px;padding:3px 10px;color:#6b6680;font-weight:600}
.tagopt.on{background:var(--violet);color:#fff;border-color:var(--violet)}
.tagopt.add{border-style:dashed;color:var(--violet)}

/* search overlay */
.searchwrap{position:fixed;inset:0;z-index:70;background:rgba(44,42,51,.45);display:flex;justify-content:center;padding:60px 16px}
.searchbox{background:var(--card);width:100%;max-width:620px;height:max-content;max-height:80vh;border-radius:18px;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,.3);display:flex;flex-direction:column}
.searchbox .top{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--line)}
.searchbox input{flex:1;border:none;outline:none;font-size:17px;background:none;font-family:inherit}
.sres{overflow-y:auto;padding:8px}
.sgrp{font-size:11px;font-weight:700;color:var(--muted);padding:8px 10px 4px;text-transform:uppercase;letter-spacing:.04em}
.sitem{display:block;width:100%;text-align:left;padding:9px 11px;border-radius:11px}
.sitem:hover{background:var(--violet-soft)}
.sitem .t{font-weight:600;font-size:14px}.sitem .s{font-size:12px;color:var(--muted)}

.weekbox{white-space:pre-wrap;font-size:13.5px;line-height:1.7;background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;font-family:'Inter','Noto Sans TC',monospace}
.hide-sm{}@media(max-width:560px){.hide-sm{display:none}}
.exch{font-size:13.5px;white-space:pre-wrap;line-height:1.6;color:#3f3b52}
</style>
</head>
<body>
<header>
  <div class="hbar">
    <nav class="nav" id="nav"></nav>
    <div class="htools">
      <span class="saved" id="saved">已存</span>
      <button class="iconbtn" id="btn-search" title="搜尋全部 (／)">
        <svg class="ic" style="width:19px;height:19px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      </button>
      <div class="menu">
        <button class="iconbtn" id="btn-menu" title="資料"><svg class="ic" style="width:20px;height:20px" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg></button>
        <div class="menupop" id="menupop" style="display:none"></div>
      </div>
      <button class="addbtn" id="btn-add"><span style="font-size:17px;line-height:1">＋</span><span class="hide-sm">客戶</span></button>
    </div>
  </div>
</header>

<main class="wrap" id="view"></main>
<div id="modal-root"></div>
<div id="search-root"></div>

<script>
"use strict";
/* ===================== 常數 ===================== */
var KEY="comart-crm-data-v1";
function todayISO(){return new Date().toISOString().slice(0,10);}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function esc(s){return (s==null?"":String(s)).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];});}
function daysSince(d){if(!d)return null;var a=new Date(d+"T00:00:00"),b=new Date(todayISO()+"T00:00:00");return Math.round((b-a)/86400000);}

/* ===================== 正規化（補新欄位） ===================== */
function normalize(d){
  d.version=2;
  d.settings=Object.assign({staleDays:7,leadDays:7},d.settings||{});
  if(!Array.isArray(d.statuses))d.statuses=DEFAULT_STATUSES.slice();
  if(!d.exchange)d.exchange={text:"",updatedAt:""};
  if(!Array.isArray(d.categories))d.categories=DEFAULT_CATS.slice();
  if(!Array.isArray(d.notes))d.notes=[];
  if(!Array.isArray(d.vendors))d.vendors=[];
  (d.customers||[]).forEach(function(c){
    if(STATUS_MIGRATE[c.status])c.status=STATUS_MIGRATE[c.status];
    if(!c.status)c.status="潛在客戶";
    if(d.statuses.indexOf(c.status)<0)d.statuses.push(c.status);
    if(c.rating){var r0=c.rating.charAt(0);c.rating=(r0==="A"||r0==="B"||r0==="C")?r0:"";}
    if(!Array.isArray(c.cards))c.cards=[];
    if(!Array.isArray(c.contacts))c.contacts=[];
    if(c.email&&!c.contacts.length){c.contacts.push({id:uid(),name:"",title:"",email:c.email,phone:"",note:""});}
    (c.projects||[]).forEach(function(p){
      p.partNumbers=p.partNumbers||"";p.isComplaint=!!p.isComplaint;p.followUpDate=p.followUpDate||p.dueDate||"";
      p.deliveryDate=p.deliveryDate||"";p.archived=!!p.archived;p.hold=p.hold||null;
      if(!Array.isArray(p.factorySubjects))p.factorySubjects=[];
      var fs=[];
      p.factorySubjects.forEach(function(x){
        if(typeof x==="string"){x.split(/[；;]/).forEach(function(s){s=s.trim();if(s)fs.push({id:uid(),subject:s});});}
        else if(x&&x.subject){fs.push({id:x.id||uid(),subject:x.subject});}
      });
      if(!fs.length&&p.factorySubject&&p.factorySubject.trim()){p.factorySubject.split(/[；;]/).forEach(function(s){s=s.trim();if(s)fs.push({id:uid(),subject:s});});}
      p.factorySubjects=fs;
      if(!Array.isArray(p.updates))p.updates=[];
      p.updates.forEach(function(u){if(typeof u.thread==="undefined")u.thread="";});
      if(!Array.isArray(p.quotes))p.quotes=[];
      if(!Array.isArray(p.samples))p.samples=[];
      (p.samples||[]).forEach(function(s){if(!s.feeType)s.feeType="不收費";});
    });
  });
  return d;
}

function load(){try{var r=localStorage.getItem(KEY);if(r){S.data=normalize(JSON.parse(r));return;}}catch(e){}S.data=normalize(seed());save();}

/* ===================== 資料輔助 ===================== */
function getC(id){return S.data.customers.filter(function(c){return c.id===id;})[0];}
function factoryText(p){return ((p.factorySubjects&&p.factorySubjects.length)?p.factorySubjects.map(function(f){return f.subject||f;}):(p.factorySubject?[p.factorySubject]:[])).join("； ");}
function lastUpd(p){if(!p.updates||!p.updates.length)return null;return p.updates.map(function(u){return u.date;}).sort().slice(-1)[0];}
function isActive(p){return !p.archived && !p.hold;}
function isStale(p){if(!isActive(p)||p.stage==="已下單")return false;var lu=lastUpd(p);if(!lu)return false;return daysSince(lu)>=(S.data.settings.staleDays||7);}

function allProjects(){var out=[];S.data.customers.forEach(function(c){(c.projects||[]).forEach(function(p){out.push({c:c,p:p});});});return out;}

    var reasons=[],late=0;
    if(p.stage==="待我處理"){reasons.push("待我處理");}
    if(p.followUpDate&&p.followUpDate<=todayISO()){reasons.push("跟進日到");late=Math.max(late,daysSince(p.followUpDate));}
    if(isStale(p)){var lu=lastUpd(p);reasons.push((daysSince(lu))+" 天沒動");late=Math.max(late,daysSince(lu));}
    if(reasons.length)toChase.push(Object.assign({reasons:reasons,late:late},x));
    // 交期將至
    if(p.deliveryDate){var dd=daysSince(p.deliveryDate); if(dd>=-lead)deliveries.push(Object.assign({late:-dd},x));}
    // 寄樣待追
    (p.samples||[]).forEach(function(s){if(s.status==="已寄出"||s.status==="客人已收")samples.push({c:x.c,p:p,s:s});});
  });
  toChase.sort(function(a,b){return b.late-a.late;});
  holds.sort(function(a,b){return b.late-a.late;});
  deliveries.sort(function(a,b){return a.late-b.late;});
  return {toChase:toChase,holds:holds,samples:samples,deliveries:deliveries};
}

/* ---------- 週報 ---------- */
function genWeekly(){
  var lines=["📋 COMART 週報摘要 — "+todayISO(),""];
  var d=dashLists();
  lines.push("【要追 "+d.toChase.length+" 件】");
  d.toChase.slice(0,30).forEach(function(x){lines.push("・"+x.c.name+" — "+x.p.customerSubject+"（"+x.reasons.join("、")+"）");});
  lines.push("");
  // 近七天有動靜
  var recent=[];allProjects().forEach(function(x){(x.p.updates||[]).forEach(function(u){if(daysSince(u.date)<=7)recent.push({c:x.c.name,s:x.p.customerSubject,d:u.date,n:u.note});});});
  recent.sort(function(a,b){return b.d.localeCompare(a.d);});
  lines.push("【近 7 天進度 "+recent.length+" 筆】");
  recent.slice(0,40).forEach(function(r){lines.push("・"+r.d+" "+r.c+" — "+r.n);});
  lines.push("");
  if(d.holds.length){lines.push("【hold 到期 "+d.holds.length+" 件】");d.holds.forEach(function(x){lines.push("・"+x.c.name+" — "+x.p.customerSubject);});lines.push("");}
  if(d.samples.length){lines.push("【寄樣待追 "+d.samples.length+" 件】");d.samples.forEach(function(x){lines.push("・"+x.c.name+" — "+(x.s.item||"樣品")+"（"+x.s.status+"）");});lines.push("");}
  if(d.deliveries.length){lines.push("【交期將至 "+d.deliveries.length+" 件】");d.deliveries.forEach(function(x){lines.push("・"+x.c.name+" — "+x.p.customerSubject+"（交期 "+x.p.deliveryDate+"）");});}
  return lines.join("\n");
}
function renderWeekly(){
  var txt=genWeekly();
  var h='<div class="row" style="justify-content:space-between;align-items:flex-end"><div><h2 class="sectitle">週報摘要 ✍️</h2><p class="subt">自動整理你在追的、近期動的、要注意的。一鍵複製貼給主管或當週報。</p></div>'+

}

document.addEventListener("change",function(e){

function doHold(days,dateStr){
  var p=getC(S.selectedId).projects.filter(function(x){return x.id===S.modal.projectId;})[0];
  var wake=dateStr|| new Date(Date.now()+days*86400000).toISOString().slice(0,10);
  if(!p.hold)p.hold={since:todayISO(),history:[]};
  p.hold.wakeDate=wake;p.hold.history.push({type:"hold",date:todayISO(),days:days||null});
  S.modal=null;save();renderModal();render();
}

function handleImageUpload(files,field){
  readModal();var draft=S.modal.draft;draft[field]=draft[field]||[];
  var arr=Array.prototype.slice.call(files);var pending=arr.length;if(!pending)return;
  arr.forEach(function(f){
    var r=new FileReader();
    r.onload=function(ev){
      var img=new Image();
      img.onload=function(){
        var max=1000,w=img.width,h=img.height;if(w>max||h>max){if(w>h){h=h*max/w;w=max;}else{w=w*max/h;h=max;}}
        var cv=document.createElement("canvas");cv.width=w;cv.height=h;cv.getContext("2d").drawImage(img,0,0,w,h);
        draft[field].push(cv.toDataURL("image/jpeg",0.7));pending--;if(pending<=0)renderModal();
      };
      img.onerror=function(){pending--;if(pending<=0)renderModal();};
      img.src=ev.target.result;
    };
    r.readAsDataURL(f);
  });
}

  else if(m.type==="project"){if(!(d.customerSubject||"").trim()){alert("請輸入客人主旨。");return;}if(!Array.isArray(d.factorySubjects))d.factorySubjects=[];var c=getC(m.customerId),j=-1;c.projects.forEach(function(x,k){if(x.id===d.id)j=k;});if(j>=0)c.projects[j]=Object.assign(c.projects[j],d);else c.projects.unshift(Object.assign({id:uid(),updates:[],quotes:[],samples:[],factorySubjects:[],hold:null,archived:false,stage:d.stage||"待我處理"},d));}
  else if(m.type==="update"){if(!(d.note||"").trim()){alert("請輸入備註。");return;}var pu=getC(m.customerId).projects.filter(function(x){return x.id===m.projectId;})[0];pu.updates.push({id:uid(),date:d.date||todayISO(),note:d.note,emails:d.emails||[],thread:d.thread||""});}
  else if(m.type==="quote"){var pq=getC(m.customerId).projects.filter(function(x){return x.id===m.projectId;})[0];pq.quotes.push({id:uid(),product:d.product,currency:d.currency,tiers:d.tiers||[],quoteDate:d.quoteDate,validUntil:d.validUntil,note:d.note,createdAt:todayISO()});}
  else if(m.type==="sample"){var psm=getC(m.customerId).projects.filter(function(x){return x.id===m.projectId;})[0];if(d.id){var k=-1;psm.samples.forEach(function(s,ix){if(s.id===d.id)k=ix;});if(k>=0)psm.samples[k]=Object.assign(psm.samples[k],d);}else psm.samples.push(Object.assign({id:uid(),createdAt:todayISO()},d));}
  else if(m.type==="note"){if(!(d.content||"").trim()&&!(d.title||"").trim()&&!(d.images||[]).length){alert("筆記不能空白。");return;}if(d.id){var ni=-1;S.data.notes.forEach(function(n,ix){if(n.id===d.id)ni=ix;});if(ni>=0)S.data.notes[ni]=Object.assign(S.data.notes[ni],d);}else S.data.notes.unshift(Object.assign({id:uid(),createdAt:todayISO(),tags:[],images:[]},d));}
  else if(m.type==="vendor"){if(!(d.name||"").trim()){alert("請輸入廠商名稱。");return;}if(d.id){var vi=-1;S.data.vendors.forEach(function(v,ix){if(v.id===d.id)vi=ix;});if(vi>=0)S.data.vendors[vi]=Object.assign(S.data.vendors[vi],d);}else S.data.vendors.unshift(Object.assign({id:uid(),createdAt:todayISO(),contacts:[]},d));}
  else if(m.type==="hold"){var hd=rv("hold_date");if(hd){doHold(null,hd);return;}else{alert("請選一個提醒時間或日期。");return;}}
  else if(m.type==="exchange"){S.data.exchange={text:d.text,updatedAt:d.date||todayISO()};}
  else if(m.type==="cats"){S.modal=null;save();render();return;}
  S.modal=null;save();renderModal();render();
}

/* hold 自訂日期：select 後關閉 picker，等按確定。改為按鈕直接套用 */
document.addEventListener("input",function(e){
  if(e.target.id==="hold_date"){/* 等使用者按確定 */}
});

/* 拖拉：看板換階段 + 客戶卡片排序 */
function reorderCust(dragId,targetId){
  if(!dragId||dragId===targetId)return;
  var arr=S.data.customers,from=-1,i;
  for(i=0;i<arr.length;i++)if(arr[i].id===dragId)from=i;
  if(from<0)return;var item=arr.splice(from,1)[0],to=-1;
  for(i=0;i<arr.length;i++)if(arr[i].id===targetId)to=i;
  if(to<0)arr.push(item);else arr.splice(to,0,item);
  save();render();
}
document.addEventListener("dragstart",function(e){
  var b=e.target.closest(".bcard");if(b){S.dragP=b.getAttribute("data-pid");S.dragC=b.getAttribute("data-cid");S.dragCust=null;e.dataTransfer.effectAllowed="move";return;}
  var pc=e.target.closest(".pcard[data-cid]");if(pc){S.dragCust=pc.getAttribute("data-cid");S.dragP=null;e.dataTransfer.effectAllowed="move";try{e.dataTransfer.setData("text/plain",S.dragCust);}catch(x){}}
});
document.addEventListener("dragover",function(e){
  var col=e.target.closest(".bcol");if(col&&S.dragP){e.preventDefault();col.classList.add("over");return;}
  var pc=e.target.closest(".pcard[data-cid]");if(pc&&S.dragCust){e.preventDefault();pc.classList.add("dropmark");}
});
document.addEventListener("dragleave",function(e){
  var col=e.target.closest(".bcol");if(col)col.classList.remove("over");
  var pc=e.target.closest(".pcard[data-cid]");if(pc)pc.classList.remove("dropmark");
});
document.addEventListener("drop",function(e){
  var col=e.target.closest(".bcol");
  if(col&&S.dragP){e.preventDefault();col.classList.remove("over");var st=col.getAttribute("data-stage");var c=getC(S.dragC);if(c){var p=c.projects.filter(function(x){return x.id===S.dragP;})[0];if(p&&p.stage!==st){p.stage=st;p.updates.push({id:uid(),date:todayISO(),note:"（看板）狀態改為 "+st,emails:[]});save();render();}}S.dragP=null;S.dragC=null;return;}
  var pc=e.target.closest(".pcard[data-cid]");
  if(pc&&S.dragCust){e.preventDefault();pc.classList.remove("dropmark");reorderCust(S.dragCust,pc.getAttribute("data-cid"));S.dragCust=null;}
});
document.addEventListener("dragend",function(){document.querySelectorAll(".dropmark").forEach(function(el){el.classList.remove("dropmark");});});

/* 頂部按鈕 */
document.getElementById("btn-add").addEventListener("click",function(){S.modal={type:"customer",draft:{status:"潛在客戶",contacts:[]}};renderModal();});
document.getElementById("btn-search").addEventListener("click",openSearch);
document.getElementById("btn-menu").addEventListener("click",function(e){e.stopPropagation();toggleMenu();});
document.addEventListener("click",function(e){var pop=document.getElementById("menupop");if(pop&&pop.style.display==="block"&&!e.target.closest(".menu"))pop.style.display="none";});

function toggleMenu(){
  var pop=document.getElementById("menupop");
  if(pop.style.display==="block"){pop.style.display="none";return;}
  pop.innerHTML='<button data-m="jexport">'+icon("box",15)+' 匯出備份 (JSON)</button>'+
    '<button data-m="jimport">'+icon("box",15)+' 匯入備份</button>'+
    '<button data-m="csv">'+icon("copy",15)+' 匯出 Excel (CSV)</button>'+
    '<button data-m="weekly">'+icon("pencil",15)+' 週報摘要</button>';
  pop.style.display="block";
  pop.querySelectorAll("button").forEach(function(b){b.onclick=function(){pop.style.display="none";menuAct(b.getAttribute("data-m"));};});
}
function menuAct(m){
  if(m==="jexport"){var blob=new Blob([JSON.stringify(S.data,null,2)],{type:"application/json"});var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="comart-crm-"+todayISO()+".json";a.click();}
  else if(m==="jimport"){var inp=document.createElement("input");inp.type="file";inp.accept="application/json";inp.onchange=function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{var o=JSON.parse(ev.target.result);if(o&&Array.isArray(o.customers)){S.data=normalize(o);save();S.view="dashboard";render();}else alert("格式不符。");}catch(x){alert("無法讀取。");}};r.readAsText(f);};inp.click();}
  else if(m==="csv")exportCSV();
  else if(m==="weekly"){S.view="weekly";render();}
}
function exportCSV(){
  var rows=[["客戶","狀態","評級","客人主旨","工廠主旨","料號","階段","客訴","下次跟進","交期","hold到期","最近進度日","最近進度"]];
  S.data.customers.forEach(function(c){(c.projects||[]).forEach(function(p){
    rows.push([c.name,c.status||"",c.rating,p.customerSubject,factoryText(p),p.partNumbers,p.archived?"已結案":p.stage,p.isComplaint?"是":"",p.followUpDate,p.deliveryDate,p.hold?p.hold.wakeDate:"",lastUpd(p)||"",(p.updates&&p.updates.length?p.updates[p.updates.length-1].note:"")]);
  });});
  var csv="\uFEFF"+rows.map(function(r){return r.map(function(x){return '"'+String(x==null?"":x).replace(/"/g,'""')+'"';}).join(",");}).join("\n");
  var blob=new Blob([csv],{type:"text/csv"});var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="comart-"+todayISO()+".csv";a.click();
}

/* 全域搜尋 */
function openSearch(){
  var root=document.getElementById("search-root");
  root.onclick=null;
  root.innerHTML='<div class="searchwrap" data-sclose="1"><div class="searchbox"><div class="top">'+icon("box",18)+'<input id="gs" placeholder="搜尋客戶、事項、進度、料號、小抄、寄樣、廠商…"><button class="iconmini" data-sclose="1">'+icon("x",18)+'</button></div><div class="sres" id="sres"></div></div></div>';
  var inp=document.getElementById("gs");inp.focus();
  inp.oninput=function(){searchRender(inp.value);};
  searchRender("");
  root.onclick=function(e){
    if(e.target.classList.contains("searchwrap")||e.target.closest("[data-sclose]")&&!e.target.closest(".searchbox")||e.target.closest(".iconmini[data-sclose]")){closeSearch();return;}
    if(e.target.closest(".iconmini")){closeSearch();return;}
    var it=e.target.closest("[data-go]");if(it){closeSearch();S.selectedId=it.getAttribute("data-go");S.view="detail";render();window.scrollTo(0,0);return;}
    var nv=e.target.closest("[data-gov]");if(nv){closeSearch();S.view=nv.getAttribute("data-gov");render();return;}
  };
}
function closeSearch(){var root=document.getElementById("search-root");root.innerHTML="";root.onclick=null;}
function searchRender(q){
  q=(q||"").trim().toLowerCase();var res=document.getElementById("sres");if(!res)return;
  if(!q){res.innerHTML='<div class="sgrp">提示</div><div class="sitem"><div class="s">打客戶名、料號、主旨或任何關鍵字…</div></div>';return;}
  var h="";
  var custs=S.data.customers.filter(function(c){return c.name.toLowerCase().indexOf(q)>=0||(c.type||"").toLowerCase().indexOf(q)>=0;});
  if(custs.length){h+='<div class="sgrp">客戶</div>'+custs.slice(0,6).map(function(c){return '<button class="sitem" data-go="'+c.id+'"><div class="t">'+esc(c.name)+'</div><div class="s">'+esc(c.type||"")+'</div></button>';}).join("");}
  var projs=[];S.data.customers.forEach(function(c){(c.projects||[]).forEach(function(p){var blob=((p.customerSubject||"")+" "+factoryText(p)+" "+(p.partNumbers||"")+" "+(p.updates||[]).map(function(u){return u.note;}).join(" ")).toLowerCase();if(blob.indexOf(q)>=0)projs.push({c:c,p:p});});});
  if(projs.length){h+='<div class="sgrp">事項 / 進度 / 料號</div>'+projs.slice(0,8).map(function(x){return '<button class="sitem" data-go="'+x.c.id+'"><div class="t">'+esc(x.p.customerSubject)+'</div><div class="s">'+esc(x.c.name)+(x.p.partNumbers?' · '+esc(x.p.partNumbers):"")+'</div></button>';}).join("");}
  var notes=S.data.notes.filter(function(n){return ((n.title||"")+" "+(n.content||"")+" "+(n.tags||[]).join(" ")).toLowerCase().indexOf(q)>=0;});
  if(notes.length){h+='<div class="sgrp">小抄</div>'+notes.slice(0,5).map(function(n){return '<button class="sitem" data-gov="notes"><div class="t">'+esc(n.title||"（無標題筆記）")+'</div><div class="s">'+esc((n.content||"").slice(0,40))+'</div></button>';}).join("");}
  var vends=S.data.vendors.filter(function(v){return (v.name+" "+(v.note||"")+" "+(v.contacts||[]).map(function(p){return p.name+p.note;}).join(" ")).toLowerCase().indexOf(q)>=0;});
  if(vends.length){h+='<div class="sgrp">廠商</div>'+vends.slice(0,5).map(function(v){return '<button class="sitem" data-gov="vendors"><div class="t">'+esc(v.name)+'</div><div class="s">'+esc(v.type||"")+'</div></button>';}).join("");}
  res.innerHTML=h||'<div class="sgrp">沒有結果</div>';
}

document.addEventListener("keydown",function(e){
  if(e.key==="Escape"){if(document.getElementById("search-root").innerHTML){closeSearch();return;}if(S.modal){S.modal=null;renderModal();}}
  if(e.key==="/"&&!/INPUT|TEXTAREA|SELECT/.test((document.activeElement||{}).tagName)){e.preventDefault();openSearch();}
});

/* ===================== 啟動 ===================== */
load();render();
</script>
